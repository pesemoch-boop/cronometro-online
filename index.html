<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronómetro Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="mode-selector">
      <button id="modeStopwatch" class="active">Cronómetro</button>
      <button id="modeCountdown">Cuenta Regresiva</button>
    </div>

    <h1 id="timer">00:00:00.00</h1>

    <div class="inputs" id="countdownInputs">
      <input type="number" id="hours" placeholder="HH" min="0">
      <input type="number" id="minutes" placeholder="MM" min="0" max="59">
      <input type="number" id="seconds" placeholder="SS" min="0" max="59">
    </div>

    <div class="buttons">
      <button id="start">Iniciar</button>
      <button id="pause">Pausar</button>
      <button id="reset">Reiniciar</button>
    </div>

    <div class="alarm-container">

      <label for="alarmFile" class="upload-btn">
        Subir alarma MP3
      </label>

      <input 
        type="file"
        id="alarmFile"
        accept=".mp3,audio/*"
      >

      <button id="removeAlarm" class="remove-btn">
        Quitar MP3
      </button>

      <p id="fileName">Ningún archivo seleccionado</p>

    </div>

  </div>
  

  <script src="script.js"></script>
</body>
</html>
